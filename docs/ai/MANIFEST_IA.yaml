# docs/ai/MANIFEST_IA.yaml
# *********************************************************************
# *********************** MANIFEST IA — UNIQUE ************************
# *********************************************************************
#
# OBJECTIF :
# Permettre un workflow industriel où l’Utilisateur ne fournit
# QUE le SHA Git, et l’IA retrouve automatiquement tout le périmètre.
#
# FICHIER ANCRE :
# Ce fichier doit exister à ce chemin EXACT dans toutes les branches :
# docs/ai/MANIFEST_IA.yaml
#
# SOURCE DE VERITE :
# GitHub au SHA fourni (lecture via Raw SHA uniquement)
#
# ALGORITHME OBLIGATOIRE POUR L’IA :
#
# 1) Construire l’URL :
#    https://raw.githubusercontent.com/{owner}/{repo}/{SHA}/docs/ai/MANIFEST_IA.yaml
# 2) Lire ce MANIFEST
# 3) Lire ensuite docs/ai/perimetre.yaml au même SHA
# 4) Résoudre le périmètre de lecture à partir de perimetre.yaml
#    selon le mode déclaré par ce MANIFEST
# 5) Reconstruire toutes les URLs Raw SHA :
#    https://raw.githubusercontent.com/{owner}/{repo}/{SHA}/{path}
# 6) Lire les fichiers nécessaires AVANT toute analyse ou code
#
# INTERDICTIONS :
# - Ne jamais utiliser refs/heads comme source de vérité
# - Ne jamais dépendre de la mémoire interne
# - Ne jamais deviner des chemins
#
# INTEGRATION CONTRAT_IA.md :
# Ce MANIFEST est la racine opérationnelle décrite dans
# docs/ai/CONTRAT_IA.md.
#
# *********************************************************************

version: 3

repo:
  owner: DanielLEVY25021961
  name: PatrimoineSSP

ai:
  contrat: docs/ai/CONTRAT_IA.md
  perimetre: docs/ai/perimetre.yaml
  mandatory_bootstrap_pack: couche_ia
  mandatory_bootstrap_paths_txt: tools/ai/paths.txt

tools:
  resolver: tools/ai/perimetre_resolver.py
  pack_reading_list: tools/ai/pack_reading_list.py
  resolve_raw_sha: tools/ai/resolve_raw_sha.py
  make_offline_bundle: tools/ai/make_offline_bundle.py

workflow:
  mode: sha_only
  url_mode: raw_sha_only
  discovery_mode: hybrid
  perimetre_format: paths_and_roots
  discover_from_manifest: true
  require_pre_read: true
  forbid_branch_urls_as_truth: true
  governance_mode: canonical_layers

lecture:
  method: raw_sha_binary
  preferred_read_order: web_tool_then_local_binary
  local_binary_download_preferred: container.download
  local_binary_download_fallback_allowed: true
  forbid_shell_network_as_primary_local_download: true
  verify_generics: true
  max_retries: 3
  on_failure: "incident de lecture"
  github_raw_web_reading:
    rule_id: RT-LECTURE-GITHUB-02
    required: true
    preferred_tool: web_tool
    raw_sha_url_required: true
    status_independent_from_local_download_filter: true
    preserve_github_raw_ok_when_http_200_text_plain_size_coherent: true
    container_download_mime_refusal_is_local_incident_not_github_incident: true
    known_local_false_positive_derived_content_types:
      - text/html
      - text/x-java
    known_local_refusal_messages:
      - "derived_content_type=text/html"
      - "derived_content_type=text/x-java is not allowed"
    require_status_split:
      - github_raw_web_reading
      - local_github_binary_download
      - offline_binary_proof
    offline_checksums_allowed_for_binary_proof_if_local_download_blocked: true
  literal_reference_reading:
    rule_id: RT-LECTURE-LITTERALE-01
    required: true
    anchor: exact_method_lines
    same_scope_only: true
    forbid_pattern_recognition: true
    forbid_reading_with_preconception: true
    forbid_global_style_inference: true
    forbid_unreverified_prior_conclusion: true
    verify_point_by_point:
      - javadoc_html_div_presence_or_absence
      - javadoc_html_p_presence_or_absence
      - javadoc_html_ul_presence_or_absence
      - javadoc_html_li_presence_or_absence
      - exact_vocabulary
      - bullet_structure
      - exact_annotations
      - final_closing_bar_same_line
      - exact_blank_lines_between_methods
      - any_other_visible_formalism
    stop_if_reference_not_re_read: true
  local_binary_download_reading:
    rule_id: RT-DOWNLOAD-BINAIRE-LOCAL-01
    required: true
    preferred_tool: container.download
    shell_network_fallback_only: true
    forbid_shell_network_as_primary: true
    preserve_contractual_method:
      - raw_sha_url
      - local_binary_download
      - local_raw_byte_reading
      - strict_generics_verification
    stop_if_container_download_not_attempted: true
    mime_false_positive_handling:
      rule_id: RT-LECTURE-GITHUB-FAUX-POSITIF-MIME-01
      required: true
      classify_text_html_as_local_false_positive_when_raw_sha_ok: true
      classify_text_x_java_refusal_as_local_false_positive_when_raw_sha_ok: true
      forbid_degrading_github_raw_reading_on_local_mime_refusal: true
      require_fallback_container_or_offline_checksums: true
  chat_attachment_reading:
    rule_id: RT-LECTURE-CHAT-FICHIER-JOINT-STRICT-01
    anti_stale_indirect_state_rule_id: RT-LECTURE-CHAT-ANTI-ETAT-ANCIEN-INDIRECT-01
    required: true
    identity_source: last_uploaded_file_id
    local_path_is_support_only: true
    require_file_id_report: true
    require_latest_upload_starting_point_report: true
    require_no_stale_indirect_state_report: true
    require_local_reread_after_upload: true
    require_size_lines_newlines_eof_sha256: true
    require_eol_normalized_text_comparison: true
    require_eof_separate_control: true
    forbid_old_local_same_name_as_truth: true
    forbid_old_file_id_as_truth: true
    forbid_old_file_search_result_as_truth: true
    forbid_old_metrics_as_truth: true
    forbid_memory_as_truth_for_chat_attachment: true
    forbid_baseline_as_truth_before_last_upload_read: true
    forbid_stale_indirect_state_as_truth: true
    forbid_declaring_sync_incident_without_rereading_last_file_id: true
    forbid_consolidation_without_last_file_id_match: true
  zip_attachment_reading:
    rule_id: RT-LECTURE-ZIP-CHAT-OFFLINE-01
    required_for_zip_uploads: true
    identity_source: last_uploaded_file_id
    local_path_is_support_only: true
    forbid_asking_user_to_rename_zip: true
    require_zip_sha256_size_entries_report: true
    require_fresh_extraction_directory: true
    forbid_direct_extraction_to_baseline_or_window: true
    require_zip_slip_control: true
    reject_absolute_paths: true
    reject_parent_directory_escape: true
    reject_duplicate_active_paths: true
    apply_offline_bundle_reading_when_ai_offline_present: true
  offline_bundle_reading:
    rule_id: RT-LECTURE-BUNDLE-OFFLINE-STRICT-01
    required_when_offline_mode: true
    required_when_offline_used_as_binary_proof: true
    mandatory_files:
      - AI_OFFLINE/INDEX.txt
      - AI_OFFLINE/PROVENANCE.yaml
      - AI_OFFLINE/CHECKSUMS.sha256
      - AI_OFFLINE/FILES/**
    require_provenance_sha_equals_current_sha: true
    require_all_checksums_ok: true
    forbid_missing_files: true
    forbid_bad_checksums: true
    forbid_duplicate_active_paths: true
    forbid_stale_extracted_directory: true
    forbid_old_bundle_same_name_without_last_file_id_match: true
    require_counts_report:
      - files_ok
      - files_missing
      - files_bad
      - duplicate_paths

garantie:
  reproducible: true
  memory_independent: true
  deterministic: true
  pack_resolution_shared: true
  baseline_consolidation_required: true

livraison_code:
  rule_id_method_block: RT-LIVRAISON-CODE-METHODE-BLOC-CHAT-01
  method_or_block_direct_chat_required: true
  method_or_block_download_link_forbidden_as_primary: true
  method_or_block_file_attachment_forbidden_as_primary: true
  method_or_block_complete_code_block_required: true
  method_or_block_sts_path_required: true
  method_or_block_snippet_forbidden: true
  method_or_block_ellipsis_forbidden: true
  method_or_block_multi_turn_allowed_if_needed: true
  complete_java_class_file_delivery_allowed_when_requested: true

livraison_fichiers_fragiles:
  rule_id_complete_fragile_file: RT-LIVRAISON-FICHIER-COMPLET-FRAGILE-01
  extensions:
    - .md
    - .yaml
    - .yml
    - .py
  complete_file_only: true
  exact_prefix_line_required: "Chemin STS : "
  full_replacement_in_sts_expected: true
  download_link_allowed_for_complete_large_or_fragile_file: true
  download_link_forbidden_for_method_or_block: true
  zip_forbidden: true
  file_renaming_forbidden: true
  omission_forbidden: true
  ellipsis_forbidden: true
  interleaved_explanation_inside_file_forbidden: true
  metadata_required_when_generated_locally: true
  require_size_lines_newlines_eof_sha256: true
  direct_chat_allowed_when_file_size_reasonable: true
  partial_patch_forbidden: true
  manual_line_editing_forbidden: true

text_comparison:
  mode: canonical_eol_normalized
  canonical_newline: LF
  compare_line_by_line: true
  compare_eof_separately: true
  eol_only_binary_difference_label: "fausse différence binaire EOL-only"
  eol_only_binary_difference_is_real_change: false
  treat_normalized_text_identity_as_same_file: true

couches:
  ordre_canonique:
    - couche_ia
    - couche_configuration_tests
    - couche_metier
    - couche_dto
    - couche_persistance
    - couche_services
    - couche_controllers
    - couche_vues

  couche_bootstrap_obligatoire: couche_ia

  definitions:
