    comparaison_texte_eol_normalisee_obligatoire: true
    comparaison_texte_eof_separee_obligatoire: true
    text_comparison_mode: "canonical_eol_normalized"
    canonical_newline_for_text_comparison: "LF"
    eol_only_binary_difference_label: "fausse différence binaire EOL-only"
    eol_only_binary_difference_is_real_change: false
    treat_normalized_text_identity_as_same_file: true
    consider_contrat_ia_same_across_sts_github_bundle_when_eol_only: true
    consider_perimetre_same_across_sts_github_bundle_when_eol_only: true
    lecture_chat_dernier_file_id_normatif: true
    lecture_chat_relecture_locale_apres_upload_obligatoire: true
    lecture_chat_interdit_ancien_fichier_local_meme_nom_comme_verite: true
