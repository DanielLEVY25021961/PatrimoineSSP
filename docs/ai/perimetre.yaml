# docs/ai/perimetre.yaml
# ======================================================================
# PERIMETRE IA — Projet PatrimoineSSP (Hexagonal)
# ======================================================================
# Objectif ABSOLU :
# - Sacraliser la découverte SHA-only du projet
# - Ne plus jamais redemander une URL Raw
# - Résoudre un périmètre HYBRIDE :
#   * fichiers pivots explicites (paths)
#   * couches de code résolues automatiquement (roots + globs)
#
# Règle :
# A chaque nouveau SHA :
#   1) reconstruire automatiquement les URLs raw SHA
#      (https://raw.githubusercontent.com/{owner}/{repo}/{sha}/{path})
#   2) relire sur GitHub via ces URLs SHA (RT-LECTURE-GITHUB-02)
#   3) consolider la baseline
# ======================================================================

project:
  owner: "DanielLEVY25021961"
  repo: "PatrimoineSSP"

variables:
  branche: "feature/controllers"

policy:
  priorite_absolue:
    source_de_verite: "docs/ai/CONTRAT_IA.md"
    source_de_verite_perimetre: "docs/ai/perimetre.yaml"
    rebuild_urls_sha_on_new_sha: true
    lecture_github_obligatoire: "RT-LECTURE-GITHUB-02"
    lecture_github_web_tool_prioritaire: true
    lecture_github_raw_sha_ok_ne_depend_pas_filtre_mime_local: true
    lecture_github_container_download_filtre_mime_local_ne_degrade_pas_github: true
    lecture_github_faux_positif_mime_text_html_explicit: true
    lecture_github_faux_positif_mime_text_x_java_explicit: true
    lecture_github_status_split_obligatoire: true
    lecture_github_preuve_binaire_offline_autorisee_si_raw_ok_et_download_local_ko: true
    interdit_demander_urls_raw: true
    offline_required_when_github_unavailable: true
    perimetre_hybride: true
    gouvernance_par_couches_canoniques: true
    couche_bootstrap_obligatoire: "couche_ia"
    dedoublonnage_paths: true
    tri_stable: true
    livraison_code_methode_bloc_chat_obligatoire: true
    livraison_code_methode_bloc_interdit_lien_telechargement_principal: true
    livraison_code_methode_bloc_interdit_fichier_joint_principal: true
    livraison_code_methode_bloc_copiable_sts_obligatoire: true
    livraison_code_methode_bloc_chemin_sts_obligatoire: true
    livraison_code_methode_bloc_snippet_interdit: true
    livraison_code_methode_bloc_ellipsis_interdit: true
    livraison_fichier_complet_fragile_complete_only: true
    livraison_fichier_complet_fragile_remplacement_total_sts: true
    livraison_fichier_complet_fragile_lien_telechargement_autorise_si_gros_ou_fragile: true
