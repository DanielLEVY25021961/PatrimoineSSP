# docs/ai/perimetre.yaml
# ======================================================================
# PERIMETRE IA — Projet PatrimoineSSP (Hexagonal)
# ======================================================================
# Objectif ABSOLU :
# - Sacraliser la découverte SHA-only du projet
# - Ne plus jamais redemander une URL Raw
# - Résoudre un périmètre HYBRIDE :
#   * fichiers pivots explicites (paths)
#   * couches de code résolues automatiquement (roots + globs)
#
# Règle :
# A chaque nouveau SHA :
#   1) reconstruire automatiquement les URLs raw SHA
#      (https://raw.githubusercontent.com/{owner}/{repo}/{sha}/{path})
#   2) relire sur GitHub via ces URLs SHA (RT-LECTURE-GITHUB-02)
#   3) consolider la baseline
# ======================================================================

project:
  owner: "DanielLEVY25021961"
  repo: "PatrimoineSSP"

variables:
  branche: "feature/uc"

policy:
  priorite_absolue:
    source_de_verite: "docs/ai/perimetre.yaml"
    rebuild_urls_sha_on_new_sha: true
    lecture_github_obligatoire: "RT-LECTURE-GITHUB-02"
    interdit_demander_urls_raw: true
    offline_required_when_github_unavailable: true
    perimetre_hybride: true
    gouvernance_par_couches_canoniques: true
    couche_bootstrap_obligatoire: "couche_ia"
    dedoublonnage_paths: true
    tri_stable: true

raw:
  template_ref_heads: "https://raw.githubusercontent.com/${owner}/${repo}/refs/heads/${branche}/${path}"
  template_sha: "https://raw.githubusercontent.com/${owner}/${repo}/${sha}/${path}"

packs:

  couche_ia:
    description: "Couche IA sacralisée : gouvernance + outils IA + contrats locaux à relire avant toute action de l'IA."
    paths:
      - "docs/ai/MANIFEST_IA.yaml"
      - "docs/ai/CONTRAT_IA.md"
      - "docs/ai/perimetre.yaml"
      - "tools/ai/perimetre_resolver.py"
      - "tools/ai/pack_reading_list.py"
      - "tools/ai/paths.txt"
      - "tools/ai/resolve_raw_sha.py"
      - "tools/ai/make_offline_bundle.py"
      - "docs/contrats/cu/ProduitICuService.md"
      - "docs/contrats/cu/SousTypeProduitICuService.md"
      - "docs/contrats/cu/TypeProduitICuService.md"
      - "docs/contrats/gateway/TypeProduitGatewayJPAService.md"

  ai:
    description: "Alias de compatibilité : gouvernance IA + outils IA."
    paths:
      - "docs/ai/MANIFEST_IA.yaml"
      - "docs/ai/CONTRAT_IA.md"
      - "docs/ai/perimetre.yaml"
      - "tools/ai/perimetre_resolver.py"
      - "tools/ai/pack_reading_list.py"
      - "tools/ai/paths.txt"
      - "tools/ai/resolve_raw_sha.py"
      - "tools/ai/make_offline_bundle.py"

  docs_contrats:
    description: "Contrats locaux lisibles par l'IA avant action et/ou pendant l'audit."
    paths:
      - "docs/contrats/cu/ProduitICuService.md"
      - "docs/contrats/cu/SousTypeProduitICuService.md"
      - "docs/contrats/cu/TypeProduitICuService.md"
      - "docs/contrats/gateway/TypeProduitGatewayJPAService.md"

  configuration_racine_build_ci:
    description: "Racine / build / CI : fichiers racine du dépôt, build Maven, script de tests des couches validées et workflow CI."
    paths:
      - ".gitattributes"
      - ".gitignore"
      - "pom.xml"
      - "README.md"
      - "scripts/test_couches_validees.sh"
      - ".github/workflows/maven.yml"
		  
  configuration:
    description: "Configuration build + ressources de tests."
    paths:
      - "pom.xml"
      - "src/test/resources/truncate-test.sql"
      - "src/test/resources/data-test.sql"
      - "src/test/resources/application-test.properties"
      - "src/test/resources/Log4j2-test.xml"

  scripts_support:
    description: "Scripts de support du projet hors script canonique des couches validées."
    roots:
      - path: "scripts"
        recursive: true
        include_globs:
          - "**/*.sh"
        exclude_globs:
          - "test_couches_validees.sh"
        allow_missing: true
			
  application_racine:
    description: "Classes racine de l'application (bootstrap, package-info, lanceurs) hors sous-packages métier/controllers/views/persistence. Root optionnelle tant qu'elle n'est pas présente sur GitHub@SHA."
    roots:
      - path: "src/main/java/levy/daniel/application"
        recursive: false
        include_globs:
          - "*.java"
        exclude_globs: []
        allow_missing: true
      - path: "src/test/java/levy/daniel/application"
        recursive: false
        include_globs:
          - "*.java"
        exclude_globs: []
        allow_missing: true

  apptechnic:
    description: "Couche apptechnic."
    roots:
      - path: "src/main/java/levy/daniel/application/apptechnic"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: true
      - path: "src/test/java/levy/daniel/application/apptechnic"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: true

  metier:
    description: "Couche métier (domain model + tests)."
    roots:
      - path: "src/main/java/levy/daniel/application/model/metier"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false
      - path: "src/test/java/levy/daniel/application/model/metier"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false

  dto:
    description: "DTO, convertisseurs DTO et tests."
    roots:
      - path: "src/main/java/levy/daniel/application/model/dto"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false
      - path: "src/test/java/levy/daniel/application/model/dto"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false

  persistance:
    description: "Couche persistance (dao, entities, convertisseurs, utilitaires, tests)."
    roots:
      - path: "src/main/java/levy/daniel/application/persistence"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false
      - path: "src/test/java/levy/daniel/application/persistence"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false
      - path: "src/main/java/levy/daniel/application/model/utilitaires"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false
      - path: "src/test/java/levy/daniel/application/model/utilitaires"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: false

  gateway:
    description: "Couche gateway : pagination, exceptions gateway/services, ports, adapters et tests associés."
    roots:
      - path: "src/main/java/levy/daniel/application/model/services"
        recursive: true
        include_globs:
          - "package-info.java"
          - "produittype/package-info.java"
          - "produittype/pagination/**/*.java"
          - "produittype/exceptionsgateway/**/*.java"
          - "produittype/exceptionsservices/**/*.java"
          - "produittype/gateway/**/*.java"
        exclude_globs:
          - "produittype/cu/**/*.java"
        allow_missing: false
      - path: "src/test/java/levy/daniel/application/model/services"
        recursive: true
        include_globs:
          - "produittype/pagination/**/*.java"
          - "produittype/gateway/**/*.java"
        exclude_globs:
          - "produittype/cu/**/*.java"
        allow_missing: false

  uc:
    description: "Use Cases / services métier UC + impl + tests."
    roots:
      - path: "src/main/java/levy/daniel/application/model/services"
        recursive: true
        include_globs:
          - "package-info.java"
          - "produittype/package-info.java"
          - "produittype/cu/**/*.java"
        exclude_globs: []
        allow_missing: false
      - path: "src/test/java/levy/daniel/application/model/services"
        recursive: true
        include_globs:
          - "produittype/cu/**/*.java"
        exclude_globs: []
        allow_missing: true

  controllers:
    description: "Couche controllers réelle du projet (desktop, mobile, web). Root optionnelle tant qu'elle n'est pas présente sur GitHub@SHA."
    roots:
      - path: "src/main/java/levy/daniel/application/controllers"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: true
      - path: "src/test/java/levy/daniel/application/controllers"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: true

  views:
    description: "Couche views réelle du projet (desktop, mobile, web). Root optionnelle tant qu'elle n'est pas présente sur GitHub@SHA."
    roots:
      - path: "src/main/java/levy/daniel/application/views"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: true
      - path: "src/test/java/levy/daniel/application/views"
        recursive: true
        include_globs:
          - "**/*.java"
        exclude_globs: []
        allow_missing: true

couches:
  ordre_canonique:
    - "couche_ia"
    - "couche_configuration_tests"
    - "couche_metier"
    - "couche_persistance"
    - "couche_services"
    - "couche_controllers"
    - "couche_vues"

  definitions:
    couche_ia:
      statut: "validated_locked"
      mandatory_pre_read: true
      packs:
        - "couche_ia"
      fichiers_pivots:
        - "docs/ai/CONTRAT_IA.md"
        - "docs/ai/MANIFEST_IA.yaml"
        - "docs/ai/perimetre.yaml"
        - "tools/ai/perimetre_resolver.py"
        - "tools/ai/pack_reading_list.py"
        - "tools/ai/paths.txt"
        - "tools/ai/resolve_raw_sha.py"
        - "tools/ai/make_offline_bundle.py"
      contract_paths:
        - "docs/contrats/cu/ProduitICuService.md"
        - "docs/contrats/cu/SousTypeProduitICuService.md"
        - "docs/contrats/cu/TypeProduitICuService.md"
        - "docs/contrats/gateway/TypeProduitGatewayJPAService.md"

	couche_configuration_tests:
	  statut: "declared"
	  mandatory_pre_read: false
	  packs:
	    - "configuration_racine_build_ci"
	    - "configuration"
	  sous_couches:
	    - "couche_configuration_tests.racine_build_ci"
			
    couche_metier:
      statut: "declared"
      mandatory_pre_read: false
      packs:
        - "metier"

    couche_persistance:
      statut: "declared"
      mandatory_pre_read: false
      packs:
        - "dto"
        - "persistance"
      sous_couches:
        - "couche_persistance.dto"
        - "couche_persistance.jpa"

    couche_services:
      statut: "declared"
      mandatory_pre_read: false
      packs:
        - "gateway"
        - "uc"
      sous_couches:
        - "couche_services.gateway"
        - "couche_services.uc"
      contract_paths:
        - "docs/contrats/cu/ProduitICuService.md"
        - "docs/contrats/cu/SousTypeProduitICuService.md"
        - "docs/contrats/cu/TypeProduitICuService.md"
        - "docs/contrats/gateway/TypeProduitGatewayJPAService.md"

    couche_controllers:
      statut: "reserved"
      mandatory_pre_read: false
      packs:
        - "controllers"

    couche_vues:
      statut: "reserved"
      mandatory_pre_read: false
      packs:
        - "views"