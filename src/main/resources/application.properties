# ===========================================
# exemples d'activation des profile groups
# ===========================================
# Test JUnit desktop + H2 in memory + JPA :
# spring.profiles.active=test-desktop-jpa
#
# Test JUnit web + H2 in memory + JPA :
# spring.profiles.active=test-web-jpa
#
# Développement desktop + H2 durable + JPA :
# spring.profiles.active=dev-desktop-jpa
#
# Développement web + H2 durable + JPA :
# spring.profiles.active=dev-web-jpa
#
# Production desktop + PostgreSQL + JPA :
# spring.profiles.active=prod-desktop-jpa
#
# Production desktop + XML :
# spring.profiles.active=prod-desktop-xml
#
# Production web + PostgreSQL + JPA :
# spring.profiles.active=prod-web-jpa
