# application-test.properties dans src/test/resources/
#
# IMPORTANT :
# - Ce fichier est un fichier de profil : il n'est pris en compte que si le profil "test" est actif.
# - Si tes classes utilisent @DataJpaTest, il faut aussi vérifier l'annotation elle-même
#   car Spring Boot active spring.jpa.show-sql=true par défaut sur ce slice de test.
# - Les lignes "Hibernate: ..." viennent classiquement de hibernate.show_sql écrit directement
#   dans la console, pas seulement du framework de logs.

############################################
# PROFIL TEST - BASE H2 EN MEMOIRE
############################################

# nom de l'application
spring.application.name=patrimoineSSP

# Ce document correspond au profil "test".
# ATTENTION : cette ligne ne rend pas le profil actif à elle seule.
spring.config.activate.on-profile=test

# empêche l'affichage de la bannière Spring
spring.main.banner-mode=off

# réduit les informations de démarrage Spring Boot
spring.main.log-startup-info=false

# garde le type d'application web tel qu'attendu par le projet
spring.main.web-application-type=servlet

# Port HTTP
server.port=8080

############################################
# DATASOURCE H2
############################################

# DB_CLOSE_DELAY=-1 : garde la base ouverte même après déconnexion.
# DB_CLOSE_ON_EXIT=FALSE : empêche la fermeture automatique à la sortie de la JVM.
spring.datasource.url=jdbc:h2:mem:patrimoinedb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

############################################
# JPA / HIBERNATE
############################################

# Dialecte H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# GESTION DU SCHEMA DE BD ***************
# spring.jpa.hibernate.ddl-auto=none : pas de génération de schéma et pas de validation : PROD
# spring.jpa.hibernate.ddl-auto=validate : validation stricte du schéma : QUALIFICATION
# spring.jpa.hibernate.ddl-auto=create : recrée la BD à chaque démarrage : TESTS MANUELS
# spring.jpa.hibernate.ddl-auto=create-drop : crée au démarrage et drop à l'arrêt : TESTS AUTOMATISES
# spring.jpa.hibernate.ddl-auto=drop : drop la BD sans la recréer
# spring.jpa.hibernate.ddl-auto=update : tente d'aligner la BD sur les entités : DEV
spring.jpa.hibernate.ddl-auto=create-drop

# Désactive l'affichage SQL côté Spring Boot.
# Cette propriété seule peut être insuffisante si @DataJpaTest force showSql=true.
spring.jpa.show-sql=false

# Désactive explicitement l'affichage SQL natif côté Hibernate.
# C'est la propriété la plus importante pour couper les lignes "Hibernate: ...".
spring.jpa.properties.hibernate.show_sql=false

# Désactive le formatage SQL multi-lignes.
spring.jpa.properties.hibernate.format_sql=false

# Désactive les commentaires SQL injectés par Hibernate.
spring.jpa.properties.hibernate.use_sql_comments=false

# Désactive la coloration ANSI éventuelle du SQL.
spring.jpa.properties.hibernate.highlight_sql=false

# Désactive les statistiques internes Hibernate.
spring.jpa.properties.hibernate.generate_statistics=false

# Configuration utile pour les tests d'intégration
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.flushMode=COMMIT

# force Spring Boot à attendre que Hibernate crée les tables,
# puis seulement ensuite exécuter les scripts d'initialisation si besoin.
spring.jpa.defer-datasource-initialization=true

############################################
# INITIALISATION SQL
############################################

# Force l'exécution des scripts SQL par SPRING (au cas où)
# "always" : force la lecture de data.sql
# "never"  : empêche la lecture automatique de data.sql
# spring.sql.init.mode=always
spring.sql.init.mode=never
spring.sql.init.platform=h2

# Chemin de scripts personnalisés si nécessaire :
# spring.sql.init.data-locations=classpath:truncate-test.sql,classpath:data-test.sql

############################################
# LOGS - MODE SILENCIEUX
############################################

# réduit au maximum le bruit global
logging.level.root=ERROR

# réduit le bruit Spring
logging.level.org.springframework=ERROR
logging.level.org.springframework.orm.jpa=ERROR
logging.level.org.springframework.transaction=ERROR

# réduit le bruit Hibernate
logging.level.org.hibernate=ERROR

# coupe les catégories SQL Hibernate classiques
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.stat=OFF
logging.level.org.hibernate.tool.schema=OFF

# coupe les catégories Hibernate 6/7 liées au JDBC
logging.level.org.hibernate.orm.jdbc=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.orm.jdbc.extract=OFF

# coupe le logger interne qui peut encore réémettre du SQL selon la pile utilisée
logging.level.org.hibernate.engine.jdbc.spi.SqlStatementLogger=OFF

# si besoin de réactiver temporairement pour debug fin :
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
# logging.level.org.hibernate.orm.jdbc.extract=TRACE
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.show_sql=true
# spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.use_sql_comments=true

############################################
# H2 CONSOLE
############################################

# Active la console H2 si tu veux l'utiliser à la main
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

############################################
# FRAMEWORK DE LOGS
############################################

# Spring Boot utilise Logback par défaut. Pour forcer Log4j2 :
logging.config=classpath:Log4j2-test.xml