# ============================== application-test.properties =====================================
# application-test.properties à toujours mettre dans src/test/resources/ et PAS
# dans src/main/resources/

# application-test.properties complète et surcharge certaines propriétés
# définies dans application.properties lorsque le profil Spring "test" est actif.

###############################################################
# ENVIRONNEMENT DE TEST - BASE H2 EN MEMOIRE - DATASOURCE H2
###############################################################
# Définit l'ENVIRONNEMENT D'EXECUTION de TEST (DataSource, LOGS, bruit des logs et du SQL, ...)
# Il ne définit ni le MODE D'ACCES à l'appli (DESKTOP, WEB, MOBILE, ...) ni l'ADAPTER D'ACCES AU STOCKAGE (JPA, XML, ...)

# Ne pas ajouter ici spring.main.web-application-type : cela relève du profil MODE D'ACCES A L'APPLI "web".
# Ne pas ajouter ici de DataSource pour les environnements d'exécution DEV/PROD : cela relève des profils des environnements d'exécution "dev" et "prod".
# Ne pas ajouter ici de choix d'ADAPTERS D'ACCES AU STOCKAGE JPA/XML : cela relève des profils de stockage.


###############################################################
# DEFINITION DE LA DATASOURCE H2 IN-MEMORY POUR LES TESTS
###############################################################
# ====================== Définition de la base H2 in-memory de TEST ============================
# DATASOURCE H2 'patrimoinedb-test' créée uniquement en mémoire pour les tests.
# Elle ne crée pas de fichier de base de données sur le disque.
# DB_CLOSE_DELAY=-1 : garde la base ouverte même après fermeture de la dernière connexion.
# DB_CLOSE_ON_EXIT=FALSE : évite une fermeture automatique gérée par H2 à l'arrêt de la JVM.
spring.datasource.url=jdbc:h2:mem:patrimoinedb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate (Jakarta) - dialecte H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# ===============================================================================================

############################################
# JPA / HIBERNATE
############################################

# =========================================================================
# GESTION DU SCHEMA DE BD
# =========================================================================
# spring.jpa.hibernate.ddl-auto=none : pas de génération de schéma et pas de validation : PROD
# spring.jpa.hibernate.ddl-auto=validate : validation stricte du schéma : QUALIFICATION
# spring.jpa.hibernate.ddl-auto=create : recrée la BD à chaque démarrage : TESTS MANUELS
# spring.jpa.hibernate.ddl-auto=create-drop : crée le schéma au démarrage puis le supprime à l'arrêt : TESTS AUTOMATISES
# spring.jpa.hibernate.ddl-auto=drop : supprime le schéma sans le recréer
# spring.jpa.hibernate.ddl-auto=update : tente d'aligner la BD sur les entités : DEV
# MODE RETENU ICI POUR LES TESTS JUnit : CREATE-DROP
# Objectif : repartir d'une base de test propre à chaque exécution.
spring.jpa.hibernate.ddl-auto=create-drop

# =========================================================================
# AFFICHAGE DU SQL PAR SPRING ET HIBERNATE
# =========================================================================
# Désactive l'affichage SQL côté Spring Boot.
# Cette propriété seule peut être insuffisante si @DataJpaTest force showSql=true.
spring.jpa.show-sql=false

# Désactive explicitement l'affichage SQL natif côté Hibernate.
# C'est la propriété la plus importante pour couper les lignes "Hibernate: ...".
spring.jpa.properties.hibernate.show_sql=false

# Désactive le formatage SQL multi-lignes (sur plusieurs lignes).
spring.jpa.properties.hibernate.format_sql=false

# Désactive les commentaires SQL injectés par Hibernate.
spring.jpa.properties.hibernate.use_sql_comments=false

# Désactive la coloration ANSI éventuelle du SQL.
spring.jpa.properties.hibernate.highlight_sql=false

# Désactive les statistiques internes Hibernate.
spring.jpa.properties.hibernate.generate_statistics=false

# ===================================================================
# CONFIGURATION UTILE POUR LES TESTS D'INTEGRATION
# (cycle transactionnel et flush HIBERNATE)
# ===================================================================
# Laisse Hibernate gérer explicitement le cycle transactionnel pendant les tests.
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# Réduit les flush intermédiaires ; la synchronisation SQL se fait au commit.
spring.jpa.properties.hibernate.flushMode=COMMIT

############################################
# INITIALISATION SQL SPRING
############################################
# Cette propriété sert uniquement si Spring doit exécuter automatiquement des scripts SQL.
# spring.jpa.defer-datasource-initialization=true : demande à Spring Boot d'attendre que Hibernate crée les tables,
# puis d'exécuter ensuite les scripts SQL Spring d'initialisation, si cette initialisation est activée.
# Inutile tant que spring.sql.init.mode=never.
# spring.jpa.defer-datasource-initialization=true

# Dans cette version, l'initialisation SQL automatique Spring est désactivée.
# "always" : Spring exécute automatiquement les scripts SQL (truncate-test.sql, data-test.sql).
# "never"  : Spring n'exécute aucun script SQL automatiquement.
# spring.sql.init.mode=always
spring.sql.init.mode=never

# Tant que spring.sql.init.mode=never, la propriété suivante (spring.sql.init.platform=h2) n'a pas d'effet pratique.
# spring.sql.init.platform=h2

# Si l'on réactive spring.sql.init.mode=always, on peut préciser explicitement le chemin des scripts personnalisés :
# spring.sql.init.data-locations=classpath:truncate-test.sql,classpath:data-test.sql


############################################
# LOGS EN TEST - MODE SILENCIEUX
############################################
# réduit au maximum le bruit global des logs
logging.level.root=ERROR

# réduit le bruit des logs Spring
logging.level.org.springframework=ERROR
logging.level.org.springframework.orm.jpa=ERROR
logging.level.org.springframework.transaction=ERROR

# réduit le bruit des logs Hibernate
logging.level.org.hibernate=ERROR

# coupe les catégories Hibernate qui réaffichent du SQL ou des informations techniques associées
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.stat=OFF
logging.level.org.hibernate.tool.schema=OFF

# coupe les catégories de logs liées au JDBC utilisées par les versions récentes de Hibernate (6.x / 7.x) 
logging.level.org.hibernate.orm.jdbc=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.orm.jdbc.extract=OFF

# coupe le logger interne qui peut encore réémettre du SQL selon la pile utilisée
logging.level.org.hibernate.engine.jdbc.spi.SqlStatementLogger=OFF

# si besoin de réactiver temporairement l'affichage SQL pour un diagnostic fin :
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
# logging.level.org.hibernate.orm.jdbc.extract=TRACE
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.show_sql=true
# spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.use_sql_comments=true

###################################################
# FRAMEWORK DE LOGS DANS L'ENVIRONNEMENT DE TEST
###################################################
# Spring Boot utilise Logback par défaut.
# Ici, on force l'utilisation du fichier de configuration Log4j2 dédié aux tests.
logging.config=classpath:Log4j2-test.xml