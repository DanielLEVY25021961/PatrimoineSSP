name: Java CI with Maven

on:
  push:
    branches: [ "develop", "feature/**" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to validated layers script
        run: chmod +x scripts/test_couches_validees.sh

      - name: Run Maven tests for validated layers
        run: ./scripts/test_couches_validees.sh
